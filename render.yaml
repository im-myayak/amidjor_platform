# Render.com Configuration for Amidjor Platform
# This file configures both frontend and backend services

services:
  # Backend Django API
  - type: web
    name: amidjor-backend
    env: python
    rootDir: backend
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: amidjor-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://amidjor-frontend.onrender.com,http://localhost:3000"
    autoDeploy: true

  # Frontend React (Vite)
  - type: web
    name: amidjor-frontend
    env: static
    rootDir: frontend
    buildCommand: |
      npm install
      npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
    autoDeploy: true
    routes:
      - type: rewrite
        source: /api/*
        destination: https://amidjor-backend.onrender.com/api/$1
      - type: rewrite
        source: /admin/*
        destination: https://amidjor-backend.onrender.com/admin/$1
      - type: rewrite
        source: /media/*
        destination: https://amidjor-backend.onrender.com/media/$1
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: amidjor-db
    databaseName: amidjor
    user: amidjor
    plan: free
